<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Big Words" />
    <title>Big Words</title>
    <link rel="icon" type="image/png" href="/BigWordsLogo.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bigwords.maximusshurr.com/" />
    <meta property="og:title" content="Big Words" />
    <meta property="og:description" content="Type anything and it fills your entire screen. Perfect for presentations, classrooms, and live events." />
    <meta property="og:image" content="https://bigwords.maximusshurr.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Big Words" />
    <meta name="twitter:description" content="Type anything and it fills your entire screen. Perfect for presentations, classrooms, and live events." />
    <meta name="twitter:image" content="https://bigwords.maximusshurr.com/og-image.png" />
  </head>
  <body>
    <div id="app">
      <!-- Canvas renders the text -->
      <canvas id="stage" role="img" aria-label=""></canvas>

      <!-- Hidden input captures keyboard on desktop and mobile -->
      <input
        id="text-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Type text to display"
        aria-describedby="sr-hint"
      />

      <!-- Command HUD overlay -->
      <div id="hud" role="dialog" aria-modal="true" aria-label="Command input" hidden>
        <div id="hud-inner">
          <input
            id="hud-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="/command"
            aria-label="Enter a command"
          />
          <ul id="hud-commands" aria-label="Available commands">
            <li><span class="hud-cmd">/theme [name]</span><span class="hud-desc">Switch theme — black, white, rainbow</span></li>
            <li><span class="hud-cmd">/room [id]</span><span class="hud-desc">Join a live sync room</span></li>
            <li><span class="hud-cmd">/exit</span><span class="hud-desc">Leave the current room</span></li>
          </ul>
        </div>
      </div>

      <!-- Screen reader announcements -->
      <div id="sr-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>
      <div id="sr-hint" class="sr-only">Type to display text full screen. Press Enter to clear. Type / to open commands.</div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
